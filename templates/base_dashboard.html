<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Team Task Manager{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="dash-body">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-icon-wrap">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <span class="sidebar-logo-text">TaskFlow</span>
    </div>

    <nav class="sidebar-nav">
      <!-- Dashboard -->
      <a href="{{ url_for('main_routes.dashboard') }}"
         class="sidebar-link {% if page == 'dashboard' %}active{% endif %}">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>

      <!-- Projects -->
      <a href="{{ url_for('main_routes.projects') }}"
         class="sidebar-link {% if page == 'projects' %}active{% endif %}">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
        </svg>
        <span>Projects</span>
      </a>
    </nav>

    <!-- Bottom: user + logout -->
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">{{ current_user.name[0].upper() }}</div>
        <div class="sidebar-user-info">
          <span class="sidebar-user-name">{{ current_user.name }}</span>
          <span class="sidebar-user-role">{{ current_user.role.capitalize() }}</span>
        </div>
      </div>
      <form method="POST" action="{{ url_for('main_routes.logout') }}">
        <button type="submit" class="sidebar-logout" title="Logout">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </form>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="dash-main">
    <!-- Top bar -->
    <header class="dash-topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h2 class="topbar-title">{% block topbar_title %}{% endblock %}</h2>
      <div class="topbar-right">
        <span class="topbar-greeting">Hi, {{ current_user.name.split()[0] }} 👋</span>
      </div>
    </header>

    <!-- Page content -->
    <main class="dash-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
